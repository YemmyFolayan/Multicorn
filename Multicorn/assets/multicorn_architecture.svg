<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#374151"/>
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#b45309"/>
    </marker>
    <linearGradient id="gHic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="gAtac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="gChip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef9c3"/><stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gRna" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fae8ff"/><stop offset="1" stop-color="#f5d0fe"/>
    </linearGradient>
    <linearGradient id="gFuse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e0e7ff"/><stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="gLoop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffedd5"/><stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="gOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="44" text-anchor="middle" font-size="30" font-weight="700" fill="#111827">Multicorn</text>
  <text x="640" y="72" text-anchor="middle" font-size="16" fill="#4b5563">Multimodal Blind Super-Resolution for Single-Cell Hi-C Enhancement and 3D Genome Reconstruction</text>

  <text x="150" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#6b7280">1 &#183; Inputs &amp; Encoders</text>
  <text x="470" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#6b7280">2 &#183; Multimodal Fusion</text>
  <text x="820" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#6b7280">3 &#183; Alternating Restoration Loop (N = 5)</text>
  <text x="1130" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#6b7280">4 &#183; Output</text>

  <!-- Inputs -->
  <g>
    <rect x="40" y="150" width="170" height="62" rx="10" fill="url(#gHic)" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="125" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a8a">scHi-C contact map</text>
    <text x="125" y="196" text-anchor="middle" font-size="12" fill="#1e40af">L  (2D CNN encoder)</text>

    <rect x="40" y="232" width="170" height="62" rx="10" fill="url(#gAtac)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="125" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">ATAC-seq</text>
    <text x="125" y="278" text-anchor="middle" font-size="12" fill="#15803d">accessibility (MLP)</text>

    <rect x="40" y="314" width="170" height="62" rx="10" fill="url(#gChip)" stroke="#eab308" stroke-width="1.5"/>
    <text x="125" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#854d0e">ChIP-seq H3K27ac</text>
    <text x="125" y="360" text-anchor="middle" font-size="12" fill="#a16207">active enhancers (MLP)</text>

    <rect x="40" y="396" width="170" height="62" rx="10" fill="url(#gRna)" stroke="#d946ef" stroke-width="1.5"/>
    <text x="125" y="422" text-anchor="middle" font-size="14" font-weight="700" fill="#86198f">RNA-seq</text>
    <text x="125" y="442" text-anchor="middle" font-size="12" fill="#a21caf">expression (MLP)</text>
  </g>

  <!-- Encoder outputs -->
  <g font-size="12" fill="#374151">
    <line x1="210" y1="181" x2="300" y2="181" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="255" y="173" text-anchor="middle">F_HiC</text>
    <line x1="210" y1="263" x2="300" y2="263" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="255" y="255" text-anchor="middle">z&#7491; (64)</text>
    <line x1="210" y1="345" x2="300" y2="345" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="255" y="337" text-anchor="middle">z&#7580; (64)</text>
    <line x1="210" y1="427" x2="300" y2="427" stroke="#374151" stroke-width="1.6" marker-end="url(#arrow)"/>
    <text x="255" y="419" text-anchor="middle">z&#691; (64)</text>
  </g>

  <!-- Fusion -->
  <g>
    <rect x="300" y="240" width="170" height="210" rx="12" fill="url(#gFuse)" stroke="#6366f1" stroke-width="1.8"/>
    <text x="385" y="270" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">Multimodal Fusion</text>
    <text x="385" y="300" text-anchor="middle" font-size="13" fill="#4338ca">z_multi = [z&#7491; || z&#7580; || z&#691;]</text>
    <text x="385" y="320" text-anchor="middle" font-size="12" fill="#4f46e5">&#8712; R&#185;&#8313;&#178;</text>
    <text x="385" y="356" text-anchor="middle" font-size="13" fill="#4338ca">projection &#966;(z_multi)</text>
    <text x="385" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">F_cond =</text>
    <text x="385" y="412" text-anchor="middle" font-size="13" fill="#4338ca">F_HiC + &#966;(z_multi)</text>
    <text x="385" y="436" text-anchor="middle" font-size="11" fill="#6366f1">reinjected every iteration</text>
  </g>

  <line x1="470" y1="345" x2="560" y2="345" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="515" y="337" text-anchor="middle" font-size="12" fill="#374151">F_cond</text>

  <!-- Restoration loop -->
  <g>
    <rect x="560" y="170" width="500" height="320" rx="14" fill="url(#gLoop)" stroke="#f97316" stroke-width="2"/>
    <text x="810" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Deep Alternating Optimization (DAN)</text>

    <rect x="600" y="222" width="180" height="92" rx="10" fill="#ffffff" stroke="#fb923c" stroke-width="1.6"/>
    <text x="690" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Estimator</text>
    <text x="690" y="272" text-anchor="middle" font-size="12" fill="#7c2d12">refine kernel T</text>
    <text x="690" y="294" text-anchor="middle" font-size="11" fill="#9a3412">min ||L &#8722; T(H)||&#178;</text>

    <rect x="840" y="222" width="180" height="92" rx="10" fill="#ffffff" stroke="#fb923c" stroke-width="1.6"/>
    <text x="930" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Restorer</text>
    <text x="930" y="266" text-anchor="middle" font-size="11" fill="#7c2d12">biologically constrained</text>
    <text x="930" y="284" text-anchor="middle" font-size="11" fill="#7c2d12">conditioned on z_multi</text>
    <text x="930" y="302" text-anchor="middle" font-size="11" fill="#9a3412">reconstruct H</text>

    <line x1="780" y1="252" x2="840" y2="252" stroke="#b45309" stroke-width="1.8" marker-end="url(#arrowLoop)"/>
    <text x="810" y="244" text-anchor="middle" font-size="11" fill="#b45309">T</text>
    <line x1="840" y1="288" x2="780" y2="288" stroke="#b45309" stroke-width="1.8" marker-end="url(#arrowLoop)"/>
    <text x="810" y="306" text-anchor="middle" font-size="11" fill="#b45309">H</text>

    <rect x="600" y="346" width="420" height="120" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.4"/>
    <text x="810" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">Biologically Constrained Objective</text>
    <text x="810" y="398" text-anchor="middle" font-size="13" fill="#7c2d12">J = ||L &#8722; T(H)||&#178; + &#946; P(H) + &#947; B(H, O)</text>
    <text x="810" y="424" text-anchor="middle" font-size="11.5" fill="#9a3412">B(H,O) penalizes contacts between inaccessible, unmarked, silent bins</text>
    <text x="810" y="444" text-anchor="middle" font-size="11.5" fill="#9a3412">w&#7522;&#11388; = 1 / (1 + |i&#8722;j| / d&#8320;)      &#947; = 0.1</text>
  </g>

  <!-- Output -->
  <line x1="1060" y1="280" x2="1150" y2="280" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="1105" y="272" text-anchor="middle" font-size="12" fill="#374151">H*</text>

  <g>
    <rect x="1150" y="170" width="110" height="120" rx="10" fill="url(#gOut)" stroke="#ef4444" stroke-width="1.6"/>
    <text x="1205" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Enhanced</text>
    <text x="1205" y="226" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">HR map</text>
    <text x="1205" y="252" text-anchor="middle" font-size="12" fill="#b91c1c">H*</text>
    <text x="1205" y="276" text-anchor="middle" font-size="11" fill="#b91c1c">+ degradation</text>
  </g>

  <line x1="1205" y1="290" x2="1205" y2="340" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>

  <g>
    <rect x="1130" y="340" width="150" height="110" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="1.6"/>
    <text x="1205" y="372" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">3DUnicorn</text>
    <text x="1205" y="394" text-anchor="middle" font-size="11.5" fill="#334155">maximum-likelihood</text>
    <text x="1205" y="412" text-anchor="middle" font-size="11.5" fill="#334155">3D reconstruction</text>
    <text x="1205" y="434" text-anchor="middle" font-size="11.5" fill="#334155">validated vs 3D-FISH</text>
  </g>

  <!-- Footer note -->
  <g>
    <rect x="40" y="540" width="1200" height="150" rx="12" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.4"/>
    <text x="60" y="568" font-size="14" font-weight="700" fill="#111827">Pipeline summary</text>
    <text x="60" y="594" font-size="12.5" fill="#374151">1. The scHi-C map is encoded by a 2D CNN to F_HiC; ATAC-seq, H3K27ac ChIP-seq and RNA-seq are each encoded by independent MLPs (128, 64) into 64-dim latents.</text>
    <text x="60" y="616" font-size="12.5" fill="#374151">2. The three regulatory latents are concatenated into z_multi (192), projected by &#966;, and added onto F_HiC to form F_cond.</text>
    <text x="60" y="638" font-size="12.5" fill="#374151">3. An Estimator (kernel T) and a biologically constrained Restorer alternate for N = 5 unrolled iterations; z_multi is reinjected each step and B(H,O) steers contacts toward the regulatory landscape.</text>
    <text x="60" y="660" font-size="12.5" fill="#374151">4. A degradation tail checks LR consistency and an image tail emits the enhanced HR map H*, which 3DUnicorn turns into a 3D genome structure.</text>
    <text x="60" y="682" font-size="11.5" fill="#6b7280">O = (a, c, r) are the normalized ATAC / ChIP / RNA tracks. Multicorn = Multimodal Unicorn, an extension of ScUnicorn blind super-resolution.</text>
  </g>
</svg>
